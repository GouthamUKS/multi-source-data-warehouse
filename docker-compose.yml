version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: warehouse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse -d warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    container_name: warehouse_etl
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://warehouse:warehouse@postgres:5432/warehouse
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: warehouse_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://warehouse:warehouse@postgres:5432/warehouse
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: warehouse_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3002:3002"

volumes:
  postgres_data:
